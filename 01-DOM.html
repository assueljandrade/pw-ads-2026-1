<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <! -- A div "root" será usada posteriormente pelo React -->
    <div id="root"></div>

    <script>
        /*
        DOM significa "Document Object Model".
        O termo se refere á forma como a linguagem JavaScript
        "enxerga" os elementos de uma página HTML.
        Quando usamos JS para criar novos elementos em uma página,
        alterá-los ou mesmo excluí-los, diz-se que estamos 
        "manipulando o DOM".
        */

        //Criando um novo parágrafo kna página usando JS
        const parag = document.createElement('p')
        parag.textContent = 'Este parágrafo foi criado com JS'

       //Captura (acesso) o elemento correspondente à div "root"
       const root = document.get.createElementById('root')

       //Faz com que o novo paragrafo seja "adotado" pela div "root"
       root.appendChild(parag)

    </script>
</body>
</html>
