<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 1 — Componente com Props</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    .card-header {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.75rem;
    }

    .azul {
      color: #185FA5;
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .laranja {
      color: #BA7517;
      font-size: 1rem;
      margin-bottom: 1.25rem;
    }

    .idade-box {
      background: #f0f2f5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      color: #444;
    }

    .idade-box span {
      font-weight: 600;
      color: #333;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <div id="root"></div>

  <script type="text/babel">

    const Pessoa = ({ nome, sobrenome, dia, mes, ano }) => (
      <div className="card">
        <div className="card-header">Dados pessoais</div>

        <p className="azul">{nome} {sobrenome}</p>

        <p className="laranja">{dia}/{mes}/{ano}</p>

        <div className="idade-box">
          Idade em 2026: <span>{2026 - ano}</span>
        </div>
      </div>
    );

    const propsMsg1 = {
      nome: 'Assuel',
      sobrenome: 'Andrade',
      dia: 15,
      mes: 6,
      ano: 1990
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Pessoa {...propsMsg1} />);

  </script>

</body>
</html>
