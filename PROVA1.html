<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício — Produto</title>
  <style>
    .verde     { color: green; }
    .azul      { color: mediumslateblue; }
    .dourado   { color: goldenrod; }
  </style>
</head>
<body>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <div id="root"></div>

  <script type="text/babel">

    const Produto = ({ produto, preco, estoque }) => (
      <>
        <h1 className="verde">{produto}</h1>

        <p className="azul">R$ {preco.toFixed(2)}</p>

        <p className="dourado">Quantidade em estoque: {estoque}</p>
      </>
    );

    const App = () => (
      <>
        <Produto produto="Tênis Nike"      preco={299.9}  estoque={15} />
        <Produto produto="Camiseta Adidas" preco={89.9}   estoque={42} />
        <Produto produto="Boné Puma"       preco={59.99}  estoque={8}  />
      </>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>

</body>
</html>
